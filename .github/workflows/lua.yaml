name: Lua CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.lua"
      - .github/workflows/lua.yaml
  pull_request:
    branches:
      - main
    paths:
      - "**/*.lua"
      - .github/workflows/lua.yaml

jobs:
  # reference from: https://github.com/nvim-lua/plenary.nvim/blob/2d9b06177a975543726ce5c73fca176cedbffe9d/.github/workflows/default.yml#L6C3-L43C20
  run_tests:
    name: unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Run tests
        run: |
          nix develop .#ci --command nvim --version
          nix develop .#ci --command make luatest

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim_version: [ v0.11.0 ]
    steps:
      - uses: actions/checkout@v6

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim_version }}

      - name: Typecheck
        env:
          VIMRUNTIME: /home/runner/nvim-${{ matrix.nvim_version }}/share/nvim/runtime
        run: |
          make lua-typecheck
