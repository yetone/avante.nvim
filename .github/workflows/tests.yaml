name: Lua CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.lua"
      - ".github/**"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.lua"
      - ".github/**"

jobs:
  # reference from: https://github.com/nvim-lua/plenary.nvim/blob/2d9b06177a975543726ce5c73fca176cedbffe9d/.github/workflows/default.yml#L6C3-L43C20
  run_tests:
    name: unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Run tests
        run: |
          nix develop .#ci --command nvim --version
          nix develop .#ci --command make luatest

      - name: Typecheck
        run:
          nix develop .#ci --command make lua-typecheck

  build-libraries:
    strategy:
      fail-fast: false
      matrix:
          os:
            - ubuntu-24.04
            - macos-latest # fails because of missing docker
            - windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/build
        with:
            os: windows-latest
            os_name: windows
            arch: x86_64
            rust_target: x86_64-pc-windows-msvc

          # os: ubuntu-latest
          # os_name: linux
          # arch: x86_64
          # rust_target: x86_64-unknown-linux-gnu
          # docker_platform: linux/amd64
          # container: quay.io/pypa/manylinux2014_x86_64 # for glibc 2.17
